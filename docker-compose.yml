version: '3.8'

services:
  dentist-website:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dentist-website
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/dentist.db
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-doctor123}
    volumes:
      - dentist-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  dentist-data:
